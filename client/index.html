<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caribbean Travel</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <p class="eyebrow">Caribbean Travel</p>
        <h1>Search Flights</h1>
        <p class="intro">
          Search one-way flight options with a direct provider lookup. No payments are processed
          and no traveler data is stored.
        </p>
        <form id="flight-form" class="form">
          <label>
            Origin airport or sky ID
            <input
              id="origin"
              name="origin"
              placeholder="JFK"
              autocomplete="off"
              required
            />
          </label>
          <label>
            Destination airport or sky ID
            <input
              id="destination"
              name="destination"
              placeholder="SJU"
              autocomplete="off"
              required
            />
          </label>
          <label>
            Departure date
            <input id="date" name="date" type="date" required />
          </label>
          <button id="search-button" type="submit">Search Flights</button>
        </form>
        <p id="status" class="status">Enter a route and search.</p>
        <ul id="results" class="results"></ul>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
  </html>
